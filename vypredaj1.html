<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Výpredaj">
<meta name="theme-color" content="#1A1A1A">
<title>Výpredaj skladu</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap');

  :root {
    --accent: #C8A400;
    --accent-dark: #a08200;
    --accent-light: #FFD600;
    --orange: #FF5C00;
    --dark: #1A1A1A;
    --dark2: #252525;
    --dark3: #2E2E2E;
    --gray: #888;
    --white: #fff;
    --green: #00C851;
    --red: #FF3D3D;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  /* ───── HEADER ───── */
  #header {
    background: var(--dark2);
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 8px;
  }
  #header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--accent-light);
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #header h1 span { color: var(--white); }

  /* Color picker button */
  #color-btn {
    background: none;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 5px 8px;
    cursor: pointer;
    font-size: 16px;
    color: var(--gray);
    transition: all .2s;
    flex-shrink: 0;
  }
  #color-btn:hover { border-color: var(--accent); color: var(--accent-light); }

  /* Color picker panel */
  #color-panel {
    display: none;
    position: absolute;
    top: 60px;
    right: 16px;
    background: var(--dark2);
    border: 1px solid #444;
    border-radius: var(--radius);
    padding: 14px;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    min-width: 220px;
  }
  #color-panel.open { display: block; }
  #color-panel p {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 10px;
  }
  .color-swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .swatch {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform .15s, border-color .15s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: var(--white); }

  .mode-tabs {
    display: flex;
    gap: 3px;
    flex: 1;
    justify-content: flex-end;
  }
  .tab-btn {
    background: var(--dark3);
    border: none;
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    -webkit-user-select: none;
    user-select: none;
  }
  .tab-btn:hover { color: var(--white); background: #3a3a3a; }
  .tab-btn.active { background: var(--accent); color: var(--white); }

  /* ───── VIEWS ───── */
  .view { display: none; }
  .view.active { display: block; }

  /* ───── ADMIN VIEW ───── */
  #view-admin {
    padding: 20px 16px;
    max-width: 640px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 14px;
  }

  .form-card {
    background: var(--dark2);
    border: 1px solid #333;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 24px;
  }

  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 5px;
  }
  .form-row input,
  .form-row textarea,
  .form-row select {
    width: 100%;
    background: var(--dark3);
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 16px; /* 16px prevents iOS zoom */
    padding: 11px 12px;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .form-row input:focus,
  .form-row textarea:focus { border-color: var(--accent); }
  .form-row textarea { resize: vertical; min-height: 70px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Photo upload */
  .photo-area {
    border: 2px dashed #3a3a3a;
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .photo-area:hover,
  .photo-area:active { border-color: var(--accent); background: rgba(200,164,0,.04); }
  .photo-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .photo-area .photo-icon { font-size: 34px; margin-bottom: 6px; }
  .photo-area p { font-size: 13px; color: var(--gray); }
  .photo-area.has-photo { border-color: var(--green); border-style: solid; }
  #photo-preview {
    width: 100%; max-height: 200px; object-fit: contain;
    border-radius: 6px; margin-top: 10px; display: none;
  }

  /* Discount slider */
  .discount-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--orange);
    text-align: center;
    line-height: 1;
    margin: 6px 0 4px;
    transition: color .3s;
  }
  .discount-display span { font-size: 26px; }
  .discount-display.zadarmo {
    color: var(--green);
    font-size: 42px;
    letter-spacing: 2px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(to right, var(--orange) 0%, var(--orange) var(--val, 50%), #3a3a3a var(--val, 50%), #3a3a3a 100%);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--orange);
    border: 3px solid var(--white);
    cursor: pointer;
  }
  .price-result {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--dark3);
    border-radius: 6px;
    padding: 12px 16px;
    margin-top: 10px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .price-result .old { color: var(--gray); font-size: 14px; text-decoration: line-through; }
  .price-result .new { color: var(--green); font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; }
  .price-result .free-tag {
    color: var(--green);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 900;
    letter-spacing: 2px;
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 15px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    touch-action: manipulation;
  }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:active { transform: scale(.97); }
  .btn-primary:disabled { background: #444; color: #666; cursor: not-allowed; }

  #upload-status {
    text-align: center;
    font-size: 13px;
    color: var(--gray);
    margin-top: 10px;
    min-height: 18px;
  }
  #upload-status.ok { color: var(--green); }
  #upload-status.err { color: var(--red); }

  /* Admin list */
  .admin-list { display: flex; flex-direction: column; gap: 10px; }
  .admin-item {
    background: var(--dark2);
    border: 1px solid #333;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
  }
  .admin-item.sold { opacity: .45; }
  .admin-item img {
    width: 56px; height: 56px; object-fit: cover;
    border-radius: 6px; flex-shrink: 0; background: var(--dark3);
  }
  .admin-item .info { flex: 1; min-width: 0; }
  .admin-item .info .name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .admin-item .info .meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .badge-zlava {
    background: var(--orange);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-zadarmo {
    background: var(--green);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px; border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-sold {
    background: #333; color: var(--gray);
    font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 20px;
    flex-shrink: 0;
  }
  .btn-sell {
    background: none;
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 6px;
    font-size: 12px; font-weight: 600;
    padding: 6px 10px;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
    flex-shrink: 0;
    touch-action: manipulation;
  }
  .btn-sell:hover { background: rgba(0,200,81,.12); }
  .btn-delete {
    background: none;
    border: 1px solid #444;
    color: var(--gray);
    border-radius: 6px;
    font-size: 12px;
    padding: 6px 9px;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
    touch-action: manipulation;
  }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }

  /* ───── LIST VIEW ───── */
  #view-list { padding: 20px 16px; max-width: 900px; margin: 0 auto; }
  .list-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }
  .list-card {
    background: var(--dark2);
    border: 1px solid #333;
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .list-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .list-card img {
    width: 100%; height: 150px; object-fit: cover; background: var(--dark3);
  }
  .list-card .card-body { padding: 12px; }
  .list-card .card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px; font-weight: 700; margin-bottom: 4px;
  }
  .list-card .card-note { font-size: 12px; color: var(--gray); margin-bottom: 8px; line-height: 1.4; }
  .list-card .card-prices { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .list-card .card-prices .old { font-size: 12px; color: var(--gray); text-decoration: line-through; }
  .list-card .card-prices .new { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--green); }
  .list-card .card-prices .badge { margin-left: auto; }

  /* ───── DISPLAY VIEW (TV) ───── */
  #view-display {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #view-display.active { display: flex; }

  .tv-header {
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 68px;
    flex-shrink: 0;
  }
  .tv-header .tv-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 900;
    letter-spacing: 2px; text-transform: uppercase; color: var(--white);
  }
  .tv-header .tv-tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 400;
    color: rgba(255,255,255,.8);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .tv-header .tv-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 600;
    color: var(--white); letter-spacing: 2px;
  }

  .tv-slide-area {
    flex: 1; position: relative; overflow: hidden;
  }
  .tv-slide {
    position: absolute; inset: 0;
    display: flex;
    opacity: 0; transition: opacity .6s ease; pointer-events: none;
  }
  .tv-slide.visible { opacity: 1; }

  .tv-slide-img {
    flex: 1.1; background: var(--dark2); position: relative; overflow: hidden;
  }
  .tv-slide-img img {
    width: 100%; height: 100%; object-fit: contain; padding: 28px;
  }
  .tv-slide-img .no-img {
    display: flex; align-items: center; justify-content: center;
    height: 100%; font-size: 80px; color: #333;
  }

  .tv-slide-info {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 40px;
    background: var(--dark2);
    border-left: 4px solid var(--accent);
    position: relative;
  }

  .tv-zlava-badge {
    position: absolute;
    top: 36px; right: 36px;
    background: var(--orange);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px; font-weight: 900;
    line-height: 1; padding: 10px 18px;
    border-radius: 10px;
    transform: rotate(3deg);
    box-shadow: 0 8px 24px rgba(255,92,0,.4);
  }
  .tv-zlava-badge.free-badge {
    background: var(--green);
    font-size: 36px;
    box-shadow: 0 8px 24px rgba(0,200,81,.35);
  }
  .tv-zlava-badge small { font-size: 18px; display: block; font-weight: 400; }

  .tv-item-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px; font-weight: 900;
    line-height: 1.05; margin-bottom: 14px; color: var(--white);
  }
  .tv-item-note {
    font-size: 17px; color: #aaa; line-height: 1.5;
    margin-bottom: 32px; max-width: 380px;
  }
  .tv-price-row {
    display: flex; align-items: center; gap: 18px;
  }
  .tv-old-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 30px; color: #555; text-decoration: line-through;
  }
  .tv-arrow { font-size: 26px; color: var(--accent); }
  .tv-new-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 76px; font-weight: 900;
    color: var(--accent-light); line-height: 1;
    text-shadow: 0 0 40px rgba(255,214,0,.25);
  }
  .tv-new-price.free-price {
    color: var(--green); font-size: 60px; letter-spacing: 3px;
    text-shadow: 0 0 40px rgba(0,200,81,.3);
  }
  .tv-currency { font-size: 34px; }

  .tv-footer {
    background: #111; height: 50px;
    display: flex; align-items: center; padding: 0 40px;
    flex-shrink: 0; overflow: hidden;
  }
  .tv-ticker { flex: 1; overflow: hidden; position: relative; height: 50px; display: flex; align-items: center; }
  .tv-ticker-inner {
    display: flex; gap: 0; white-space: nowrap;
    animation: ticker 30s linear infinite;
  }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .tv-ticker-item {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 0 36px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px; font-weight: 600; letter-spacing: 0.5px; color: var(--gray);
  }
  .tv-ticker-item .dot { color: var(--orange); font-size: 20px; line-height: 1; }
  .tv-ticker-item strong { color: var(--white); }
  .tv-ticker-item .price { color: var(--accent-light); }

  .tv-progress {
    position: absolute; bottom: 0; left: 0;
    height: 3px; background: var(--accent); width: 0%;
    transition: width linear;
  }

  .tv-dots {
    display: flex; justify-content: center; gap: 8px;
    padding: 8px 0; background: #111; flex-shrink: 0;
  }
  .tv-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; transition: background .3s;
  }
  .tv-dot.active { background: var(--accent); }

  .tv-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; color: #333;
  }
  .tv-empty .icon { font-size: 60px; }
  .tv-empty p { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; letter-spacing: 2px; text-transform: uppercase; }

  /* ───── EXIT DISPLAY BTN ───── */
  #exit-display {
    position: fixed;
    top: 14px; right: 110px; /* posunuté doľava od hodiniek */
    background: rgba(0,0,0,.65);
    border: 1px solid #555;
    color: #888; font-size: 11px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    padding: 5px 12px; border-radius: 5px;
    cursor: pointer; z-index: 200;
    transition: all .2s;
    display: none;
    text-transform: uppercase;
  }
  #exit-display:hover { color: var(--white); border-color: var(--white); }

  /* ───── EMPTY STATE ───── */
  .empty-state {
    text-align: center; padding: 40px 24px; color: var(--gray);
  }
  .empty-state .icon { font-size: 44px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* ───── LOADING ───── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity .4s;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 38px; height: 38px;
    border: 3px solid #333; border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ───── TOAST ───── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--dark2); border: 1px solid #3a3a3a;
    color: var(--white); font-size: 14px;
    padding: 12px 20px; border-radius: 8px;
    opacity: 0; pointer-events: none;
    transition: opacity .3s; z-index: 9998;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
  #toast.ok { border-color: var(--green); color: var(--green); }
  #toast.err { border-color: var(--red); color: var(--red); }

  /* ───── MOBILE BOTTOM NAV ───── */
  #mobile-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--dark2);
    border-top: 1px solid #333;
    z-index: 150;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .mobile-nav-inner {
    display: flex;
    height: 60px;
  }
  .mnav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    transition: color .2s;
    touch-action: manipulation;
  }
  .mnav-btn .mnav-icon { font-size: 22px; }
  .mnav-btn.active { color: var(--accent-light); }
  .mnav-btn.active .mnav-icon { filter: drop-shadow(0 0 6px var(--accent)); }

  /* ───── RESPONSIVE ───── */
  @media (max-width: 600px) {
    /* Show mobile bottom nav, hide top tabs */
    .mode-tabs { display: none; }
    #mobile-nav { display: block; }

    /* Extra bottom padding so content isn't hidden behind nav */
    .view.active { padding-bottom: calc(60px + env(safe-area-inset-bottom) + 16px); }
    #view-display.active { padding-bottom: 0; }

    /* TV slide mobile */
    .tv-slide { flex-direction: column; }
    .tv-slide-img { flex: 0 0 45%; }
    .tv-item-name { font-size: 28px; }
    .tv-new-price { font-size: 52px; }
    .tv-zlava-badge { font-size: 32px; top: 12px; right: 12px; }
    .tv-header { padding: 0 16px; height: 52px; }
    .tv-header .tv-tagline { display: none; }
    .two-col { grid-template-columns: 1fr; }

    #header { height: 52px; }
    #header h1 { font-size: 17px; }
  }

  @media (min-width: 601px) {
    /* Desktop — ensure bottom nav hidden */
    #mobile-nav { display: none !important; }
  }
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div></div>
<div id="toast"></div>
<button id="exit-display" onclick="exitDisplay()">✕ Zavrieť</button>

<!-- COLOR PANEL -->
<div id="color-panel">
  <p>Farba témy</p>
  <div class="color-swatches" id="swatches"></div>
</div>

<!-- HEADER -->
<div id="header">
  <h1>📦 Výpredaj <span>Skladu</span></h1>
  <button id="color-btn" onclick="toggleColorPanel()" title="Zmeniť farbu">🎨</button>
  <div class="mode-tabs">
    <button class="tab-btn active" onclick="switchView('admin')" id="tab-admin">⚙ Sklad</button>
    <button class="tab-btn" onclick="switchView('list')" id="tab-list">📋 Zoznam</button>
    <button class="tab-btn" onclick="switchView('display')" id="tab-display">📺 TV</button>
  </div>
</div>

<!-- ══ ADMIN VIEW ══ -->
<div id="view-admin" class="view active">
  <div class="section-title">Pridať poškodený tovar</div>

  <div class="form-card">
    <div class="form-row">
      <label>Fotografia tovaru</label>
      <div class="photo-area" id="photo-area">
        <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="handlePhoto(this)">
        <div class="photo-icon">📷</div>
        <p>Kliknite alebo odfote mobilom</p>
        <img id="photo-preview" alt="">
      </div>
    </div>

    <div class="form-row">
      <label>Názov tovaru</label>
      <input type="text" id="f-name" placeholder="napr. Cement CEM I 42,5R – poškodené vrece" />
    </div>

    <div class="form-row">
      <label>Poznámka / stav tovaru</label>
      <textarea id="f-note" placeholder="napr. Rohové vrece stuhnuté, cca 60% použiteľného..."></textarea>
    </div>

    <div class="two-col">
      <div class="form-row">
        <label>Bežná cena (€)</label>
        <input type="number" id="f-price" placeholder="0.00" min="0" step="0.01" inputmode="decimal" oninput="updatePriceCalc()" />
      </div>
      <div class="form-row">
        <label>Počet / JM</label>
        <input type="text" id="f-qty" placeholder="napr. 1 ks" />
      </div>
    </div>

    <div class="form-row">
      <label>Zľava</label>
      <div class="discount-display" id="discount-val">50<span>%</span></div>
      <input type="range" id="f-discount" min="5" max="100" step="5" value="50"
             oninput="updateDiscount(this)" style="--val:50%">
      <div class="price-result" id="price-result">
        <span class="old" id="pr-old">—</span>
        <span>→</span>
        <span class="new" id="pr-new">—</span>
      </div>
    </div>

    <button class="btn-primary" id="btn-add" onclick="addItem()">✚ Pridať do výpredaja</button>
    <div id="upload-status"></div>
  </div>

  <div class="section-title">Aktuálne položky</div>
  <div class="admin-list" id="admin-list">
    <div class="empty-state"><div class="icon">📭</div><p>Žiadne položky</p></div>
  </div>
</div>

<!-- ══ LIST VIEW ══ -->
<div id="view-list" class="view">
  <div class="section-title" style="padding:20px 16px 0">Dostupný výpredajový tovar</div>
  <div style="padding:12px 16px 20px">
    <div class="list-grid" id="list-grid">
      <div class="empty-state"><div class="icon">📭</div><p>Žiadne položky</p></div>
    </div>
  </div>
</div>

<!-- ══ DISPLAY VIEW (TV) ══ -->
<div id="view-display" class="view">
  <div class="tv-header">
    <div class="tv-logo">📦 Výpredaj Skladu</div>
    <div class="tv-tagline">Tovar so zľavou — opýtajte sa pokladníka</div>
    <div class="tv-time" id="tv-time">--:--</div>
  </div>
  <div class="tv-slide-area" id="tv-slide-area">
    <div class="tv-progress" id="tv-progress"></div>
  </div>
  <div class="tv-dots" id="tv-dots"></div>
  <div class="tv-footer">
    <div class="tv-ticker">
      <div class="tv-ticker-inner" id="tv-ticker"></div>
    </div>
  </div>
</div>

<!-- ══ MOBILE BOTTOM NAV ══ -->
<div id="mobile-nav">
  <div class="mobile-nav-inner">
    <button class="mnav-btn active" id="mnav-admin" onclick="switchView('admin')">
      <span class="mnav-icon">⚙️</span>
      <span>Sklad</span>
    </button>
    <button class="mnav-btn" id="mnav-list" onclick="switchView('list')">
      <span class="mnav-icon">📋</span>
      <span>Zoznam</span>
    </button>
    <button class="mnav-btn" id="mnav-display" onclick="switchView('display')">
      <span class="mnav-icon">📺</span>
      <span>TV</span>
    </button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB2gLq6UzzjpijSlaTV3HMPEq6_KJgW5RA",
  authDomain: "register-naradia.firebaseapp.com",
  databaseURL: "https://register-naradia-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "register-naradia",
  storageBucket: "register-naradia.firebasestorage.app",
  messagingSenderId: "931257476693",
  appId: "1:931257476693:web:9b766eac323100564296dc",
  measurementId: "G-YB9V5ZM5BG"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const ref = db.ref('vypredaj');

// ══════════════════════════════════════════
// COLOR THEME SYSTEM
// ══════════════════════════════════════════
const THEMES = [
  { name: 'Zlatá',    accent: '#C8A400', dark: '#a08200', light: '#FFD600' },
  { name: 'Modrá',    accent: '#1565C0', dark: '#0d47a1', light: '#64B5F6' },
  { name: 'Zelená',   accent: '#2E7D32', dark: '#1B5E20', light: '#81C784' },
  { name: 'Fialová',  accent: '#6A1B9A', dark: '#4A148C', light: '#CE93D8' },
  { name: 'Červená',  accent: '#C62828', dark: '#8E0000', light: '#EF9A9A' },
  { name: 'Tyrkys',   accent: '#00796B', dark: '#004D40', light: '#80CBC4' },
  { name: 'Strieborná',accent:'#546E7A', dark: '#37474F', light: '#B0BEC5' },
  { name: 'Ružová',   accent: '#AD1457', dark: '#880E4F', light: '#F48FB1' },
];
let activeTheme = 0;

function buildSwatches() {
  const el = document.getElementById('swatches');
  el.innerHTML = THEMES.map((t, i) => `
    <div class="swatch ${i===activeTheme?'active':''}"
         style="background:${t.light}"
         title="${t.name}"
         onclick="applyTheme(${i})"></div>
  `).join('');
}

function applyTheme(idx) {
  activeTheme = idx;
  const t = THEMES[idx];
  const r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent-dark', t.dark);
  r.setProperty('--accent-light', t.light);
  buildSwatches();
  localStorage.setItem('vypredaj_theme', idx);
  // close panel
  document.getElementById('color-panel').classList.remove('open');
}

function toggleColorPanel() {
  document.getElementById('color-panel').classList.toggle('open');
}

// Close on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#color-panel') && !e.target.closest('#color-btn')) {
    document.getElementById('color-panel').classList.remove('open');
  }
});

// Load saved theme
const savedTheme = localStorage.getItem('vypredaj_theme');
if (savedTheme !== null) applyTheme(parseInt(savedTheme));
buildSwatches();

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let items = {};
let slideIndex = 0;
let slideTimer = null;
let photoBase64 = null;
const SLIDE_DURATION = 8000;

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('load', () => {
  ref.on('value', snap => {
    items = snap.val() || {};
    renderAll();
    document.getElementById('loading-overlay').classList.add('hidden');
  });

  setInterval(() => {
    const now = new Date();
    document.getElementById('tv-time').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0');
  }, 1000);
});

// ══════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.mnav-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('view-' + name).classList.add('active');
  const tabEl = document.getElementById('tab-' + name);
  if (tabEl) tabEl.classList.add('active');
  const mnavEl = document.getElementById('mnav-' + name);
  if (mnavEl) mnavEl.classList.add('active');

  const isDisplay = name === 'display';
  document.getElementById('header').style.display = isDisplay ? 'none' : '';
  document.getElementById('mobile-nav').style.display = isDisplay ? 'none' : '';
  document.getElementById('exit-display').style.display = isDisplay ? 'block' : 'none';

  if (isDisplay) startSlideshow();
  else stopSlideshow();
}

function exitDisplay() {
  switchView('list');
}

// ══════════════════════════════════════════
// PHOTO
// ══════════════════════════════════════════
function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.75);
      const preview = document.getElementById('photo-preview');
      preview.src = photoBase64;
      preview.style.display = 'block';
      document.getElementById('photo-area').classList.add('has-photo');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════
// DISCOUNT
// ══════════════════════════════════════════
function updateDiscount(el) {
  const v = parseInt(el.value);
  el.style.setProperty('--val', v + '%');
  const dispEl = document.getElementById('discount-val');
  if (v === 100) {
    dispEl.innerHTML = 'ZADARMO';
    dispEl.className = 'discount-display zadarmo';
  } else {
    dispEl.innerHTML = v + '<span>%</span>';
    dispEl.className = 'discount-display';
  }
  updatePriceCalc();
}

function updatePriceCalc() {
  const price = parseFloat(document.getElementById('f-price').value);
  const disc = parseInt(document.getElementById('f-discount').value);
  if (isNaN(price) || price <= 0) {
    document.getElementById('pr-old').textContent = '—';
    document.getElementById('pr-new').textContent = '—';
    return;
  }
  const newPrice = price * (1 - disc / 100);
  document.getElementById('pr-old').textContent = price.toFixed(2) + ' €';
  if (disc === 100) {
    document.getElementById('pr-new').innerHTML = '<span class="free-tag">🎁 ZADARMO</span>';
  } else {
    document.getElementById('pr-new').textContent = newPrice.toFixed(2) + ' €';
  }
}

// ══════════════════════════════════════════
// ADD ITEM
// ══════════════════════════════════════════
async function addItem() {
  const name = document.getElementById('f-name').value.trim();
  const note = document.getElementById('f-note').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const qty = document.getElementById('f-qty').value.trim();
  const discount = parseInt(document.getElementById('f-discount').value);

  if (!name) { toast('Zadaj názov tovaru', 'err'); return; }
  if (isNaN(price) || price <= 0) { toast('Zadaj platnú cenu', 'err'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  setStatus('Ukladám...', '');

  const newPrice = discount === 100 ? 0 : parseFloat((price * (1 - discount / 100)).toFixed(2));
  const item = {
    name, note, price, newPrice, qty, discount,
    photo: photoBase64 || null,
    created: Date.now(),
    sold: false
  };

  try {
    await ref.push(item);
    document.getElementById('f-name').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-qty').value = '';
    document.getElementById('f-discount').value = 50;
    document.getElementById('f-discount').style.setProperty('--val', '50%');
    document.getElementById('discount-val').innerHTML = '50<span>%</span>';
    document.getElementById('discount-val').className = 'discount-display';
    document.getElementById('pr-old').textContent = '—';
    document.getElementById('pr-new').textContent = '—';
    photoBase64 = null;
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-area').classList.remove('has-photo');
    document.getElementById('photo-input').value = '';
    setStatus('✓ Položka pridaná!', 'ok');
    toast('Položka pridaná do výpredaja', 'ok');
  } catch(e) {
    setStatus('Chyba: ' + e.message, 'err');
    toast('Chyba pri ukladaní', 'err');
  }
  btn.disabled = false;
}

function setStatus(msg, cls) {
  const el = document.getElementById('upload-status');
  el.textContent = msg;
  el.className = cls;
}

// ══════════════════════════════════════════
// MARK SOLD / DELETE
// ══════════════════════════════════════════
function markSold(id) {
  ref.child(id).update({ sold: true });
  toast('Označené ako predané', 'ok');
}

function deleteItem(id) {
  if (!confirm('Vymazať položku?')) return;
  ref.child(id).remove();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderAll() {
  renderAdmin();
  renderList();
  if (document.getElementById('view-display').classList.contains('active')) buildSlides();
}

function getActiveItems() {
  return Object.entries(items).filter(([,v]) => !v.sold).sort(([,a],[,b]) => b.created - a.created);
}

function getAllItems() {
  return Object.entries(items).sort(([,a],[,b]) => b.created - a.created);
}

function discountBadge(v) {
  if (v.discount === 100) return `<span class="badge-zadarmo">🎁 ZADARMO</span>`;
  return `<span class="badge-zlava">-${v.discount}%</span>`;
}

function renderAdmin() {
  const el = document.getElementById('admin-list');
  const all = getAllItems();
  if (!all.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Žiadne položky</p></div>';
    return;
  }
  el.innerHTML = all.map(([id, v]) => `
    <div class="admin-item ${v.sold ? 'sold' : ''}">
      ${v.photo
        ? `<img src="${v.photo}" alt="">`
        : `<div style="width:56px;height:56px;background:var(--dark3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">📦</div>`
      }
      <div class="info">
        <div class="name">${esc(v.name)}</div>
        <div class="meta">${v.qty ? esc(v.qty) + ' · ' : ''}${v.price?.toFixed(2)} € → ${v.discount===100 ? 'ZADARMO' : v.newPrice?.toFixed(2)+' €'}</div>
      </div>
      ${v.sold
        ? `<span class="badge-sold">✓ Predané</span>`
        : `${discountBadge(v)}
           <button class="btn-sell" onclick="markSold('${id}')">✓ Predané</button>`
      }
      <button class="btn-delete" onclick="deleteItem('${id}')">🗑</button>
    </div>
  `).join('');
}

function renderList() {
  const el = document.getElementById('list-grid');
  const active = getActiveItems();
  if (!active.length) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div><p>Momentálne žiadny výpredajový tovar</p></div>';
    return;
  }
  el.innerHTML = active.map(([id, v]) => `
    <div class="list-card">
      ${v.photo
        ? `<img src="${v.photo}" alt="${esc(v.name)}">`
        : `<div style="height:150px;background:var(--dark3);display:flex;align-items:center;justify-content:center;font-size:44px">📦</div>`
      }
      <div class="card-body">
        <div class="card-name">${esc(v.name)}</div>
        ${v.note ? `<div class="card-note">${esc(v.note)}</div>` : ''}
        <div class="card-prices">
          <span class="old">${v.price?.toFixed(2)} €</span>
          ${v.discount===100
            ? `<span class="new" style="color:var(--green)">🎁 ZADARMO</span>`
            : `<span class="new">${v.newPrice?.toFixed(2)} €</span>`
          }
          <span class="badge">${discountBadge(v)}</span>
        </div>
        ${v.qty ? `<div style="font-size:11px;color:var(--gray);margin-top:6px">Množstvo: ${esc(v.qty)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════
// TV SLIDESHOW
// ══════════════════════════════════════════
function buildSlides() {
  const area = document.getElementById('tv-slide-area');
  const dotsEl = document.getElementById('tv-dots');
  area.querySelectorAll('.tv-slide').forEach(s => s.remove());

  const active = getActiveItems();
  if (!active.length) {
    area.innerHTML = `
      <div class="tv-progress" id="tv-progress"></div>
      <div class="tv-empty"><div class="icon">📭</div><p>Momentálne žiadny výpredajový tovar</p></div>`;
    dotsEl.innerHTML = '';
    buildTicker([]);
    return;
  }

  active.forEach(([id, v], i) => {
    const isFree = v.discount === 100;
    const slide = document.createElement('div');
    slide.className = 'tv-slide';
    slide.dataset.idx = i;
    slide.innerHTML = `
      <div class="tv-slide-img">
        ${v.photo ? `<img src="${v.photo}" alt="${esc(v.name)}">` : `<div class="no-img">📦</div>`}
      </div>
      <div class="tv-slide-info">
        <div class="tv-zlava-badge ${isFree ? 'free-badge' : ''}">
          <small>${isFree ? '🎁' : 'zľava'}</small>
          ${isFree ? 'ZADARMO' : '-'+v.discount+'%'}
        </div>
        <div class="tv-item-name">${esc(v.name)}</div>
        ${v.note ? `<div class="tv-item-note">${esc(v.note)}</div>` : ''}
        ${v.qty ? `<div style="font-size:16px;color:#777;margin-bottom:18px">Množstvo: ${esc(v.qty)}</div>` : ''}
        <div class="tv-price-row">
          ${!isFree ? `<span class="tv-old-price">${v.price?.toFixed(2)} €</span><span class="tv-arrow">→</span>` : ''}
          <span class="tv-new-price ${isFree ? 'free-price' : ''}">
            ${isFree ? '🎁 ZADARMO' : v.newPrice?.toFixed(2)+'<span class="tv-currency"> €</span>'}
          </span>
        </div>
      </div>
    `;
    area.insertBefore(slide, area.firstChild);
  });

  dotsEl.innerHTML = active.map((_, i) => `<div class="tv-dot" id="dot-${i}"></div>`).join('');
  buildTicker(active);
  showSlide(0);
}

function buildTicker(active) {
  const inner = document.getElementById('tv-ticker');
  if (!active.length) { inner.innerHTML = ''; return; }
  const rows = [...active, ...active].map(([,v]) => {
    const isFree = v.discount === 100;
    return `<span class="tv-ticker-item">
      <span class="dot">◆</span>
      <strong>${esc(v.name)}</strong>
      <span style="color:var(--gray)">→</span>
      <span class="price">${isFree ? '🎁 ZADARMO' : v.newPrice?.toFixed(2)+' €'}</span>
      <span style="color:var(--accent)">(${isFree ? '100%' : '-'+v.discount+'%'})</span>
    </span>`;
  }).join('');
  inner.innerHTML = rows;
}

function showSlide(idx) {
  const slides = document.querySelectorAll('.tv-slide');
  const dots = document.querySelectorAll('.tv-dot');
  if (!slides.length) return;
  idx = ((idx % slides.length) + slides.length) % slides.length;
  slideIndex = idx;
  slides.forEach((s, i) => s.classList.toggle('visible', i === idx));
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  const prog = document.getElementById('tv-progress');
  if (prog) {
    prog.style.transition = 'none';
    prog.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      prog.style.transition = `width ${SLIDE_DURATION}ms linear`;
      prog.style.width = '100%';
    }));
  }
}

function startSlideshow() {
  buildSlides();
  stopSlideshow();
  slideTimer = setInterval(() => {
    const slides = document.querySelectorAll('.tv-slide');
    if (slides.length > 1) showSlide(slideIndex + 1);
  }, SLIDE_DURATION);
}

function stopSlideshow() {
  if (slideTimer) clearInterval(slideTimer);
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  setTimeout(() => el.className = '', 2800);
}
</script>
</body>
</html>
