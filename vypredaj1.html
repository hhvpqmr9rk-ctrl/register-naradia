<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Výpredaj skladu</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap');

  :root {
    --orange: #FF5C00;
    --orange-dark: #CC4900;
    --yellow: #FFD600;
    --dark: #1A1A1A;
    --dark2: #252525;
    --dark3: #2E2E2E;
    --gray: #888;
    --light: #F5F3EF;
    --white: #fff;
    --green: #00C851;
    --red: #FF3D3D;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
  }

  /* ───── HEADER ───── */
  #header {
    background: var(--dark2);
    border-bottom: 2px solid var(--orange);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--orange);
    text-transform: uppercase;
  }
  #header h1 span { color: var(--white); }

  .mode-tabs {
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    background: var(--dark3);
    border: none;
    color: var(--gray);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn:hover { color: var(--white); background: #3a3a3a; }
  .tab-btn.active { background: var(--orange); color: var(--white); }

  /* ───── VIEWS ───── */
  .view { display: none; }
  .view.active { display: block; }

  /* ───── ADMIN VIEW ───── */
  #view-admin {
    padding: 28px 24px;
    max-width: 640px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 18px;
  }

  .form-card {
    background: var(--dark2);
    border: 1px solid #333;
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 28px;
  }

  .form-row {
    margin-bottom: 16px;
  }
  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .form-row input,
  .form-row textarea,
  .form-row select {
    width: 100%;
    background: var(--dark3);
    border: 1px solid #3a3a3a;
    border-radius: 6px;
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .2s;
  }
  .form-row input:focus,
  .form-row textarea:focus {
    border-color: var(--orange);
  }
  .form-row textarea { resize: vertical; min-height: 70px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Photo upload */
  .photo-area {
    border: 2px dashed #3a3a3a;
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .photo-area:hover { border-color: var(--orange); background: rgba(255,92,0,.04); }
  .photo-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .photo-area .photo-icon { font-size: 36px; margin-bottom: 8px; }
  .photo-area p { font-size: 13px; color: var(--gray); }
  .photo-area.has-photo { border-color: var(--green); border-style: solid; }
  #photo-preview {
    width: 100%; max-height: 200px; object-fit: contain;
    border-radius: 6px; margin-top: 12px; display: none;
  }

  /* Discount slider */
  .discount-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--orange);
    text-align: center;
    line-height: 1;
    margin: 8px 0 4px;
  }
  .discount-display span { font-size: 24px; }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, var(--orange) 0%, var(--orange) var(--val, 50%), #3a3a3a var(--val, 50%), #3a3a3a 100%);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--orange);
    border: 3px solid var(--white);
    cursor: pointer;
  }
  .price-result {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--dark3);
    border-radius: 6px;
    padding: 12px 16px;
    margin-top: 12px;
  }
  .price-result .old { color: var(--gray); font-size: 14px; text-decoration: line-through; }
  .price-result .new { color: var(--green); font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; }

  .btn-primary {
    width: 100%;
    background: var(--orange);
    border: none;
    border-radius: 8px;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn-primary:hover { background: var(--orange-dark); }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { background: #444; color: #666; cursor: not-allowed; }

  #upload-status {
    text-align: center;
    font-size: 13px;
    color: var(--gray);
    margin-top: 10px;
    min-height: 18px;
  }
  #upload-status.ok { color: var(--green); }
  #upload-status.err { color: var(--red); }

  /* Admin list */
  .admin-list { display: flex; flex-direction: column; gap: 10px; }
  .admin-item {
    background: var(--dark2);
    border: 1px solid #333;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    transition: border-color .2s;
  }
  .admin-item.sold { opacity: .45; }
  .admin-item img {
    width: 64px; height: 64px; object-fit: cover;
    border-radius: 6px; flex-shrink: 0; background: var(--dark3);
  }
  .admin-item .info { flex: 1; min-width: 0; }
  .admin-item .info .name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .admin-item .info .meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .badge-zlava {
    background: var(--orange);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-sold {
    background: #333; color: var(--gray);
    font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px;
    flex-shrink: 0;
  }
  .btn-sell {
    background: none;
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 6px;
    font-size: 12px; font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-sell:hover { background: rgba(0,200,81,.12); }
  .btn-delete {
    background: none;
    border: 1px solid #444;
    color: var(--gray);
    border-radius: 6px;
    font-size: 12px;
    padding: 6px 10px;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }

  /* ───── LIST VIEW ───── */
  #view-list { padding: 28px 24px; max-width: 900px; margin: 0 auto; }
  .list-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .list-card {
    background: var(--dark2);
    border: 1px solid #333;
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s, transform .2s;
  }
  .list-card:hover { border-color: var(--orange); transform: translateY(-2px); }
  .list-card.sold { opacity: .4; }
  .list-card img {
    width: 100%; height: 160px; object-fit: cover;
    background: var(--dark3);
  }
  .list-card .card-body { padding: 14px; }
  .list-card .card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700;
    margin-bottom: 4px;
  }
  .list-card .card-note { font-size: 12px; color: var(--gray); margin-bottom: 10px; line-height: 1.4; }
  .list-card .card-prices {
    display: flex; align-items: baseline; gap: 10px;
  }
  .list-card .card-prices .old { font-size: 13px; color: var(--gray); text-decoration: line-through; }
  .list-card .card-prices .new { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--green); }
  .list-card .card-prices .badge { margin-left: auto; }

  /* ───── DISPLAY VIEW (TV) ───── */
  #view-display {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #view-display.active { display: flex; }

  .tv-header {
    background: var(--orange);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 72px;
    flex-shrink: 0;
  }
  .tv-header .tv-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white);
  }
  .tv-header .tv-tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 400;
    color: rgba(255,255,255,.8);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tv-header .tv-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 600;
    color: var(--white);
    letter-spacing: 2px;
  }

  .tv-slide-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .tv-slide {
    position: absolute;
    inset: 0;
    display: flex;
    opacity: 0;
    transition: opacity .6s ease;
    pointer-events: none;
  }
  .tv-slide.visible { opacity: 1; }

  .tv-slide-img {
    flex: 1.1;
    background: var(--dark2);
    position: relative;
    overflow: hidden;
  }
  .tv-slide-img img {
    width: 100%; height: 100%; object-fit: contain;
    padding: 32px;
  }
  .tv-slide-img .no-img {
    display: flex; align-items: center; justify-content: center;
    height: 100%; font-size: 80px; color: #333;
  }

  .tv-slide-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px;
    background: var(--dark2);
    border-left: 4px solid var(--orange);
    position: relative;
  }

  .tv-zlava-badge {
    position: absolute;
    top: 40px; right: 40px;
    background: var(--orange);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px; font-weight: 900;
    line-height: 1;
    padding: 12px 20px;
    border-radius: 10px;
    transform: rotate(3deg);
    box-shadow: 0 8px 24px rgba(255,92,0,.4);
  }
  .tv-zlava-badge small { font-size: 20px; display: block; font-weight: 400; }

  .tv-item-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 52px; font-weight: 900;
    line-height: 1.05;
    margin-bottom: 16px;
    color: var(--white);
  }
  .tv-item-note {
    font-size: 18px;
    color: #aaa;
    line-height: 1.5;
    margin-bottom: 40px;
    max-width: 380px;
  }

  .tv-price-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .tv-old-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    color: #555;
    text-decoration: line-through;
  }
  .tv-arrow { font-size: 28px; color: var(--orange); }
  .tv-new-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 80px; font-weight: 900;
    color: var(--yellow);
    line-height: 1;
    text-shadow: 0 0 40px rgba(255,214,0,.3);
  }
  .tv-currency { font-size: 36px; }

  .tv-footer {
    background: #111;
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 48px;
    gap: 0;
    flex-shrink: 0;
  }
  .tv-ticker {
    flex: 1;
    overflow: hidden;
    position: relative;
    height: 52px;
    display: flex;
    align-items: center;
  }
  .tv-ticker-inner {
    display: flex;
    gap: 0;
    white-space: nowrap;
    animation: ticker 30s linear infinite;
  }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .tv-ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 0 40px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--gray);
  }
  .tv-ticker-item .dot {
    color: var(--orange);
    font-size: 22px;
    line-height: 1;
  }
  .tv-ticker-item strong { color: var(--white); }
  .tv-ticker-item .price { color: var(--yellow); }

  /* Progress bar */
  .tv-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: var(--orange);
    width: 0%;
    transition: width linear;
  }

  /* Slide counter dots */
  .tv-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 10px 0;
    background: #111;
    flex-shrink: 0;
  }
  .tv-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background .3s;
  }
  .tv-dot.active { background: var(--orange); }

  .tv-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #333;
  }
  .tv-empty .icon { font-size: 64px; }
  .tv-empty p { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }

  /* ───── EMPTY STATE ───── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--gray);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ───── LOADING ───── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity .4s;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #333;
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--dark2); border: 1px solid #3a3a3a;
    color: var(--white); font-size: 14px;
    padding: 12px 20px; border-radius: 8px;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
    z-index: 9998;
  }
  #toast.show { opacity: 1; }
  #toast.ok { border-color: var(--green); color: var(--green); }
  #toast.err { border-color: var(--red); color: var(--red); }

  /* Exit display btn */
  #exit-display {
    position: fixed; top: 16px; right: 16px;
    background: rgba(0,0,0,.6);
    border: 1px solid #444;
    color: #666; font-size: 12px;
    padding: 6px 12px; border-radius: 6px;
    cursor: pointer; z-index: 200;
    transition: all .2s;
    display: none;
  }
  #exit-display:hover { color: var(--white); border-color: var(--white); }

  @media (max-width: 600px) {
    .tv-slide { flex-direction: column; }
    .tv-item-name { font-size: 32px; }
    .tv-new-price { font-size: 56px; }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div></div>
<div id="toast"></div>
<button id="exit-display" onclick="exitDisplay()">✕ Zavrieť</button>

<!-- HEADER -->
<div id="header">
  <h1>📦 Výpredaj <span>Skladu</span></h1>
  <div class="mode-tabs">
    <button class="tab-btn active" onclick="switchView('admin')" id="tab-admin">⚙ Sklad</button>
    <button class="tab-btn" onclick="switchView('list')" id="tab-list">📋 Zoznam</button>
    <button class="tab-btn" onclick="switchView('display')" id="tab-display">📺 TV displej</button>
  </div>
</div>

<!-- ══ ADMIN VIEW ══ -->
<div id="view-admin" class="view active">
  <div class="section-title">Pridať poškodený tovar</div>

  <div class="form-card">
    <!-- Photo -->
    <div class="form-row">
      <label>Fotografia tovaru</label>
      <div class="photo-area" id="photo-area">
        <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="handlePhoto(this)">
        <div class="photo-icon">📷</div>
        <p>Kliknite alebo odfote mobilom</p>
        <img id="photo-preview" alt="">
      </div>
    </div>

    <!-- Name -->
    <div class="form-row">
      <label>Názov tovaru</label>
      <input type="text" id="f-name" placeholder="napr. Cement CEM I 42,5R 25kg – poškodené vrece" />
    </div>

    <!-- Note -->
    <div class="form-row">
      <label>Poznámka / stav tovaru</label>
      <textarea id="f-note" placeholder="napr. Rohové vrece stuhnuté, cca 60% obsahu použiteľného. Vhodné na okamžité použitie."></textarea>
    </div>

    <!-- Prices -->
    <div class="two-col">
      <div class="form-row">
        <label>Bežná cena (€)</label>
        <input type="number" id="f-price" placeholder="0.00" min="0" step="0.01" oninput="updatePriceCalc()" />
      </div>
      <div class="form-row">
        <label>Počet kusov / JM</label>
        <input type="text" id="f-qty" placeholder="napr. 1 ks, 3 vrecia" />
      </div>
    </div>

    <!-- Discount -->
    <div class="form-row">
      <label>Zľava</label>
      <div class="discount-display" id="discount-val">50<span>%</span></div>
      <input type="range" id="f-discount" min="5" max="95" step="5" value="50"
             oninput="updateDiscount(this)" style="--val:50%">
      <div class="price-result" id="price-result">
        <span class="old" id="pr-old">—</span>
        <span>→</span>
        <span class="new" id="pr-new">—</span>
      </div>
    </div>

    <button class="btn-primary" id="btn-add" onclick="addItem()">✚ Pridať do výpredaja</button>
    <div id="upload-status"></div>
  </div>

  <!-- Existing items -->
  <div class="section-title">Aktuálne položky</div>
  <div class="admin-list" id="admin-list">
    <div class="empty-state"><div class="icon">📭</div><p>Žiadne položky</p></div>
  </div>
</div>

<!-- ══ LIST VIEW ══ -->
<div id="view-list" class="view">
  <div style="max-width:900px;margin:0 auto;padding:28px 24px 0">
    <div class="section-title">Dostupný výpredajový tovar</div>
  </div>
  <div style="max-width:900px;margin:0 auto;padding:0 24px 28px">
    <div class="list-grid" id="list-grid">
      <div class="empty-state"><div class="icon">📭</div><p>Žiadne položky</p></div>
    </div>
  </div>
</div>

<!-- ══ DISPLAY VIEW (TV) ══ -->
<div id="view-display" class="view">
  <div class="tv-header">
    <div class="tv-logo">📦 Výpredaj Skladu</div>
    <div class="tv-tagline">Tovar so zľavou — opýtajte sa pokladníka</div>
    <div class="tv-time" id="tv-time">--:--</div>
  </div>

  <div class="tv-slide-area" id="tv-slide-area">
    <div class="tv-progress" id="tv-progress"></div>
  </div>

  <div class="tv-dots" id="tv-dots"></div>

  <div class="tv-footer">
    <div class="tv-ticker">
      <div class="tv-ticker-inner" id="tv-ticker"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// FIREBASE CONFIG — rovnaký projekt ako Register náradia
// ══════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB2gLq6UzzjpijSlaTV3HMPEq6_KJgW5RA",
  authDomain: "register-naradia.firebaseapp.com",
  databaseURL: "https://register-naradia-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "register-naradia",
  storageBucket: "register-naradia.firebasestorage.app",
  messagingSenderId: "931257476693",
  appId: "1:931257476693:web:9b766eac323100564296dc",
  measurementId: "G-YB9V5ZM5BG"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const ref = db.ref('vypredaj');   // ← nová vetva, nenaruší naradia

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let items = {};
let slideIndex = 0;
let slideTimer = null;
let progressTimer = null;
let photoBase64 = null;
const SLIDE_DURATION = 8000; // ms per slide

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('load', () => {
  ref.on('value', snap => {
    items = snap.val() || {};
    renderAll();
    document.getElementById('loading-overlay').classList.add('hidden');
  });

  // Time clock for TV
  setInterval(() => {
    const now = new Date();
    document.getElementById('tv-time').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0');
  }, 1000);
});

// ══════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('header').style.display = name === 'display' ? 'none' : '';
  document.getElementById('exit-display').style.display = name === 'display' ? 'block' : 'none';

  if (name === 'display') startSlideshow();
  else stopSlideshow();
}

function exitDisplay() {
  switchView('list');
  document.getElementById('header').style.display = '';
  document.getElementById('exit-display').style.display = 'none';
}

// ══════════════════════════════════════════
// PHOTO HANDLING (base64, žiadny externý upload)
// ══════════════════════════════════════════
function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;

  // Compress & convert to base64
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.75);

      const preview = document.getElementById('photo-preview');
      preview.src = photoBase64;
      preview.style.display = 'block';
      document.getElementById('photo-area').classList.add('has-photo');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════
// DISCOUNT & PRICE CALC
// ══════════════════════════════════════════
function updateDiscount(el) {
  const v = el.value;
  el.style.setProperty('--val', v + '%');
  document.getElementById('discount-val').innerHTML = v + '<span>%</span>';
  updatePriceCalc();
}

function updatePriceCalc() {
  const price = parseFloat(document.getElementById('f-price').value);
  const disc = parseInt(document.getElementById('f-discount').value);
  if (isNaN(price) || price <= 0) {
    document.getElementById('pr-old').textContent = '—';
    document.getElementById('pr-new').textContent = '—';
    return;
  }
  const newPrice = price * (1 - disc / 100);
  document.getElementById('pr-old').textContent = price.toFixed(2) + ' €';
  document.getElementById('pr-new').textContent = newPrice.toFixed(2) + ' €';
}

// ══════════════════════════════════════════
// ADD ITEM
// ══════════════════════════════════════════
async function addItem() {
  const name = document.getElementById('f-name').value.trim();
  const note = document.getElementById('f-note').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const qty = document.getElementById('f-qty').value.trim();
  const discount = parseInt(document.getElementById('f-discount').value);

  if (!name) { toast('Zadaj názov tovaru', 'err'); return; }
  if (isNaN(price) || price <= 0) { toast('Zadaj platnú cenu', 'err'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  setStatus('Ukladám...', '');

  const newPrice = parseFloat((price * (1 - discount / 100)).toFixed(2));
  const item = {
    name, note, price, newPrice, qty, discount,
    photo: photoBase64 || null,
    created: Date.now(),
    sold: false
  };

  try {
    await ref.push(item);
    // Reset form
    document.getElementById('f-name').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-qty').value = '';
    document.getElementById('f-discount').value = 50;
    document.getElementById('f-discount').style.setProperty('--val', '50%');
    document.getElementById('discount-val').innerHTML = '50<span>%</span>';
    document.getElementById('pr-old').textContent = '—';
    document.getElementById('pr-new').textContent = '—';
    photoBase64 = null;
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-area').classList.remove('has-photo');
    document.getElementById('photo-input').value = '';
    setStatus('✓ Položka pridaná!', 'ok');
    toast('Položka pridaná do výpredaja', 'ok');
  } catch(e) {
    setStatus('Chyba: ' + e.message, 'err');
    toast('Chyba pri ukladaní', 'err');
  }
  btn.disabled = false;
}

function setStatus(msg, cls) {
  const el = document.getElementById('upload-status');
  el.textContent = msg;
  el.className = cls;
}

// ══════════════════════════════════════════
// MARK AS SOLD / DELETE
// ══════════════════════════════════════════
function markSold(id) {
  ref.child(id).update({ sold: true });
  toast('Označené ako predané', 'ok');
}

function deleteItem(id) {
  if (!confirm('Vymazať položku?')) return;
  ref.child(id).remove();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderAll() {
  renderAdmin();
  renderList();
  if (document.getElementById('view-display').classList.contains('active')) {
    buildSlides();
  }
}

function getActiveItems() {
  return Object.entries(items)
    .filter(([,v]) => !v.sold)
    .sort(([,a],[,b]) => b.created - a.created);
}

function getAllItems() {
  return Object.entries(items)
    .sort(([,a],[,b]) => b.created - a.created);
}

// Admin list
function renderAdmin() {
  const el = document.getElementById('admin-list');
  const all = getAllItems();
  if (!all.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Žiadne položky</p></div>';
    return;
  }
  el.innerHTML = all.map(([id, v]) => `
    <div class="admin-item ${v.sold ? 'sold' : ''}">
      ${v.photo
        ? `<img src="${v.photo}" alt="">`
        : `<div style="width:64px;height:64px;background:var(--dark3);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">📦</div>`
      }
      <div class="info">
        <div class="name">${esc(v.name)}</div>
        <div class="meta">${v.qty ? esc(v.qty) + ' · ' : ''}${v.price?.toFixed(2)} € → ${v.newPrice?.toFixed(2)} €</div>
      </div>
      ${v.sold
        ? `<span class="badge-sold">✓ Predané</span>`
        : `<span class="badge-zlava">-${v.discount}%</span>
           <button class="btn-sell" onclick="markSold('${id}')">✓ Predané</button>`
      }
      <button class="btn-delete" onclick="deleteItem('${id}')">🗑</button>
    </div>
  `).join('');
}

// List (pokladňa)
function renderList() {
  const el = document.getElementById('list-grid');
  const active = getActiveItems();
  if (!active.length) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div><p>Momentálne žiadny výpredajový tovar</p></div>';
    return;
  }
  el.innerHTML = active.map(([id, v]) => `
    <div class="list-card">
      ${v.photo
        ? `<img src="${v.photo}" alt="${esc(v.name)}">`
        : `<div style="height:160px;background:var(--dark3);display:flex;align-items:center;justify-content:center;font-size:48px">📦</div>`
      }
      <div class="card-body">
        <div class="card-name">${esc(v.name)}</div>
        ${v.note ? `<div class="card-note">${esc(v.note)}</div>` : ''}
        <div class="card-prices">
          <span class="old">${v.price?.toFixed(2)} €</span>
          <span class="new">${v.newPrice?.toFixed(2)} €</span>
          <span class="badge badge-zlava">-${v.discount}%</span>
        </div>
        ${v.qty ? `<div style="font-size:12px;color:var(--gray);margin-top:8px">Množstvo: ${esc(v.qty)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════
// TV SLIDESHOW
// ══════════════════════════════════════════
function buildSlides() {
  const area = document.getElementById('tv-slide-area');
  const dotsEl = document.getElementById('tv-dots');
  const progressEl = document.getElementById('tv-progress');

  // Remove old slides (keep progress bar)
  area.querySelectorAll('.tv-slide').forEach(s => s.remove());

  const active = getActiveItems();

  if (!active.length) {
    area.innerHTML = `
      <div class="tv-progress" id="tv-progress"></div>
      <div class="tv-empty">
        <div class="icon">📭</div>
        <p>Momentálne žiadny výpredajový tovar</p>
      </div>`;
    dotsEl.innerHTML = '';
    buildTicker([]);
    return;
  }

  active.forEach(([id, v], i) => {
    const slide = document.createElement('div');
    slide.className = 'tv-slide';
    slide.dataset.idx = i;
    slide.innerHTML = `
      <div class="tv-slide-img">
        ${v.photo
          ? `<img src="${v.photo}" alt="${esc(v.name)}">`
          : `<div class="no-img">📦</div>`
        }
      </div>
      <div class="tv-slide-info">
        <div class="tv-zlava-badge"><small>zľava</small>-${v.discount}%</div>
        <div class="tv-item-name">${esc(v.name)}</div>
        ${v.note ? `<div class="tv-item-note">${esc(v.note)}</div>` : ''}
        ${v.qty ? `<div style="font-size:18px;color:#777;margin-bottom:20px">Množstvo: ${esc(v.qty)}</div>` : ''}
        <div class="tv-price-row">
          <span class="tv-old-price">${v.price?.toFixed(2)} €</span>
          <span class="tv-arrow">→</span>
          <span class="tv-new-price">${v.newPrice?.toFixed(2)}<span class="tv-currency"> €</span></span>
        </div>
      </div>
    `;
    area.insertBefore(slide, area.firstChild);
  });

  dotsEl.innerHTML = active.map((_, i) =>
    `<div class="tv-dot" id="dot-${i}"></div>`
  ).join('');

  buildTicker(active);
  showSlide(0);
}

function buildTicker(active) {
  const inner = document.getElementById('tv-ticker');
  if (!active.length) { inner.innerHTML = ''; return; }
  // Duplicate for seamless loop
  const items = [...active, ...active].map(([,v]) =>
    `<span class="tv-ticker-item">
      <span class="dot">◆</span>
      <strong>${esc(v.name)}</strong>
      <span style="color:var(--gray)">→</span>
      <span class="price">${v.newPrice?.toFixed(2)} €</span>
      <span style="color:var(--orange)">(-${v.discount}%)</span>
    </span>`
  ).join('');
  inner.innerHTML = items;
}

function showSlide(idx) {
  const slides = document.querySelectorAll('.tv-slide');
  const dots = document.querySelectorAll('.tv-dot');
  if (!slides.length) return;

  idx = ((idx % slides.length) + slides.length) % slides.length;
  slideIndex = idx;

  slides.forEach((s, i) => s.classList.toggle('visible', i === idx));
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));

  // Animate progress bar
  const prog = document.getElementById('tv-progress');
  if (prog) {
    prog.style.transition = 'none';
    prog.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        prog.style.transition = `width ${SLIDE_DURATION}ms linear`;
        prog.style.width = '100%';
      });
    });
  }
}

function startSlideshow() {
  buildSlides();
  stopSlideshow();
  slideTimer = setInterval(() => {
    const slides = document.querySelectorAll('.tv-slide');
    if (slides.length > 1) showSlide(slideIndex + 1);
  }, SLIDE_DURATION);
}

function stopSlideshow() {
  if (slideTimer) clearInterval(slideTimer);
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  setTimeout(() => el.className = '', 2800);
}
</script>
</body>
</html>
